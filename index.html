<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity Web Player | TesteGyrooo</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <link rel="stylesheet" href="TemplateData/style.css">
  <link rel="manifest" href="manifest.webmanifest">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* Botão estilizado */
    .start-button {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 18px 42px;
      font-size: clamp(18px, 3vw, 28px);
      background: linear-gradient(135deg, #2196f3, #1976d2);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35);
      transition: 0.2s ease;
      z-index: 9999;
    }

    .start-button:hover {
      transform: translate(-50%, -50%) scale(1.05);
      box-shadow: 0 8px 22px rgba(0,0,0,0.45);
    }

    /* Garantir que o canvas sempre ocupe a tela */
    #unity-canvas {
      width: 100vw !important;
      height: 100vh !important;
      display: block;
      background: #000;
    }
  </style>
</head>

<body>

  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>

    <div id="unity-warning"></div>
  </div>

  <!-- Botão de iniciar -->
  <button id="startButton" class="start-button">Iniciar Jogo</button>

  <script>
    window.addEventListener("load", function () {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("ServiceWorker.js");
      }
    });

    var container = document.querySelector("#unity-container");
    var canvas = document.querySelector("#unity-canvas");
    var loadingBar = document.querySelector("#unity-loading-bar");
    var progressBarFull = document.querySelector("#unity-progress-bar-full");
    var warningBanner = document.querySelector("#unity-warning");

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
      }
      var div = document.createElement('div');
      div.innerHTML = msg;
      warningBanner.appendChild(div);
      if (type == 'error') div.style = 'background: red; padding: 10px;';
      else {
        if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
        setTimeout(function () {
          warningBanner.removeChild(div);
          updateBannerVisibility();
        }, 5000);
      }
      updateBannerVisibility();
    }

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/SensorTeste.loader.js";

    var config = {
      arguments: [],
      dataUrl: buildUrl + "/SensorTeste.data",
      frameworkUrl: buildUrl + "/SensorTeste.framework.js",
      codeUrl: buildUrl + "/SensorTeste.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "TesteGyrooo",
      productVersion: "1.0",
      showBanner: unityShowBanner,
    };

    // Mobile viewport
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      var meta = document.createElement('meta');
      meta.name = 'viewport';
      meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
      document.getElementsByTagName('head')[0].appendChild(meta);
    }

    // Clique no botão inicia o Unity
    document.getElementById("startButton").addEventListener("click", function () {
      const btn = this;
      btn.style.opacity = "0";
      btn.style.pointerEvents = "none";

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = (progress * 100) + "%";
        }).then(() => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          alert(message);
          btn.style.opacity = "1";
          btn.style.pointerEvents = "auto";
        });
      };

      document.body.appendChild(script);
    });
  </script>

</body>
</html>
